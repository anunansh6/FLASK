{% extends 'main.html' %}

{% block body %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | Dark Midnight</title>
    <style>
        :root {
            /* Dark Theme Palette */
            --bg-color: #0f172a;       /* Deep Navy */
            --card-bg: #1e293b;       /* Slate Blue/Grey */
            --accent-blue: #38bdf8;   /* Sky Blue */
            --text-primary: #f8fafc;  /* Near White */
            --text-muted: #94a3b8;    /* Muted Blue-Grey */
            --btn-hover: #0ea5e9;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .profile-card {
            background: var(--card-bg);
            width: 360px;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05); /* Subtle glass border */
        }

        .image-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
        }

        .profile-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-blue);
            padding: 5px; /* Creates a gap between image and border */
        }

        .online-status {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 18px;
            height: 18px;
            background-color: #22c55e;
            border: 3px solid var(--card-bg);
            border-radius: 50%;
        }

        h2 {
            margin: 10px 0 5px 0;
            font-size: 1.6rem;
            letter-spacing: -0.5px;
        }

        .username {
            color: var(--accent-blue);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 15px;
            display: block;
        }

        .bio {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: rgba(15, 23, 42, 0.5); /* Slightly darker inset */
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 25px;
        }

        .stat-item span {
            display: block;
        }

        .stat-value {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-primary);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 4px;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .btn-primary {
            background-color: var(--accent-blue);
            color: #0f172a;
            border: none;
        }

        .btn-primary:hover {
            background-color: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
        }

        .btn-outline {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--text-muted);
        }

        .btn-outline:hover {
            border-color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="image-container">
            <img src="https://via.placeholder.com/150" alt="User Avatar" class="profile-image">
            <div class="online-status"></div>
        </div>

        <h2>Jordan Blake</h2>
        <h3>Username: {{ b }}</h3>
        <span class="username">@jordan_dev</span>
        
        <p class="bio">Full-stack developer focused on sleek interfaces and dark mode aesthetics.</p>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-value">2.4k</span>
                <span class="stat-label">Fol.</span>
            </div>
            <div class="stat-item">
                <span class="stat-value">18</span>
                <span class="stat-label">Repos</span>
            </div>
            <div class="stat-item">
                <span class="stat-value">912</span>
                <span class="stat-label">Stars</span>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-primary">Follow</button>
{% endblock %}
